<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 魔法畫家 - 直接生成版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FFF9E6; 
            color: #333;
            overflow-x: hidden;
        }

        .sticky-basket {
            position: sticky;
            top: 10px;
            z-index: 50;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            border: 4px solid #FB923C;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .category-card {
            background: white;
            border-radius: 2rem;
            border: 5px solid;
            box-shadow: 0 8px 0 0 rgba(0,0,0,0.05);
        }

        .prompt-tag {
            border: 3px solid #eee;
            transition: all 0.2s;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            padding: 1rem 0.25rem;
            border-radius: 1.25rem;
            background: white;
            cursor: pointer;
        }

        .prompt-tag .emoji { font-size: 2.8rem; line-height: 1.1; }
        .prompt-tag .label { font-size: 1.1rem; font-weight: 900; }

        .prompt-item {
            display: inline-flex;
            align-items: center;
            background: #fff;
            border: 3px solid #333;
            padding: 6px 14px;
            margin: 4px;
            border-radius: 50px;
            font-weight: 900;
            box-shadow: 3px 3px 0px #333;
        }

        /* 顏色定義 */
        .color-blue { border-color: #3B82F6; color: #1E40AF; }
        .color-green { border-color: #10B981; color: #065F46; }
        .color-red { border-color: #EF4444; color: #991B1B; }
        .color-yellow { border-color: #F59E0B; color: #92400E; }
        .color-purple { border-color: #8B5CF6; color: #5B21B6; }
        .color-pink { border-color: #EC4899; color: #9D174D; }
        .color-orange { border-color: #F97316; color: #9A3412; }

        /* 圖片生成展示區 */
        #result-container {
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #fb923c;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="p-6 text-center">
        <h1 class="text-3xl md:text-4xl font-black text-orange-500">🎨 AI 魔法畫家</h1>
    </header>

    <main class="max-w-7xl mx-auto px-4 space-y-8">
        
        <!-- 籃子與控制區 -->
        <section class="sticky-basket p-4 md:p-6">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-black text-xl text-orange-600 flex items-center gap-2">🧺 魔法籃子</h3>
                <span id="counter" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-sm font-bold">0 個靈感</span>
            </div>
            
            <div id="prompt-display" class="w-full min-h-[80px] max-h-[120px] bg-orange-50/50 rounded-2xl p-3 mb-4 flex flex-wrap gap-1 content-start border-2 border-dashed border-orange-200 overflow-y-auto">
                <span class="text-orange-300 font-bold italic p-2">點選下方的圖卡來組合...</span>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <button onclick="generateImage()" id="gen-btn" class="col-span-2 md:col-span-1 bg-gradient-to-r from-orange-400 to-pink-500 text-white py-4 rounded-xl font-black text-xl shadow-[0_6px_0_0_#c2410c] flex items-center justify-center gap-2 border-2 border-white transform active:scale-95 transition">
                    <i class="fas fa-wand-magic-sparkles"></i> 變出圖片
                </button>
                <button onclick="copyFullPrompt()" class="bg-green-500 text-white py-4 rounded-xl font-black text-lg shadow-[0_6px_0_0_#15803d] border-2 border-white">
                    <i class="fas fa-copy"></i> 複製咒語
                </button>
                <button onclick="clearPrompt()" class="bg-gray-400 text-white py-4 rounded-xl font-black text-lg shadow-[0_6px_0_0_#4b5563] border-2 border-white">
                    重來
                </button>
            </div>
        </section>

        <!-- 圖片顯示區 -->
        <section id="result-container" class="bg-white rounded-[2.5rem] p-6 border-8 border-orange-200 shadow-xl overflow-hidden">
            <div id="loading-area" class="hidden flex flex-col items-center justify-center py-12">
                <div class="loader mb-4"></div>
                <p class="text-orange-500 font-black text-2xl animate-pulse">正在施魔法，請等一下下... ✨</p>
            </div>
            <div id="image-area" class="hidden flex flex-col items-center">
                <h2 class="text-2xl font-black text-gray-700 mb-4">✨ 魔法圖片變出來了！</h2>
                <img id="output-image" class="rounded-3xl shadow-2xl max-w-full h-auto border-4 border-white" alt="生成的魔法圖片">
                <button onclick="downloadImg()" class="mt-6 bg-blue-500 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-blue-400 transition">
                    <i class="fas fa-download mr-2"></i> 儲存這張畫
                </button>
            </div>
        </section>

        <!-- 選項區塊 (簡化範例) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="category-card border-blue-400 p-4 color-blue">
                <h4 class="font-black text-lg mb-4 text-center">🦁 動物</h4>
                <div class="grid grid-cols-2 gap-2">
                    <button class="prompt-tag" onclick="addToPrompt('大貓咪', 'A giant fluffy cat')"><span class="emoji">🐱</span><span class="label">貓咪</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('恐龍', 'A cute dinosaur')"><span class="emoji">🦖</span><span class="label">恐龍</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('獨角獸', 'Magical unicorn')"><span class="emoji">🦄</span><span class="label">獨角獸</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('太空人', 'Little astronaut')"><span class="emoji">👨‍🚀</span><span class="label">太空人</span></button>
                </div>
            </div>

            <div class="category-card border-green-400 p-4 color-green">
                <h4 class="font-black text-lg mb-4 text-center">🏃 動作</h4>
                <div class="grid grid-cols-2 gap-2">
                    <button class="prompt-tag" onclick="addToPrompt('在跳舞', 'dancing happily')"><span class="emoji">💃</span><span class="label">跳舞</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('在飛', 'flying in the sky')"><span class="emoji">🕊️</span><span class="label">在飛</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('在游泳', 'swimming in the pool')"><span class="emoji">🏊</span><span class="label">游泳</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('在吃冰', 'eating ice cream')"><span class="emoji">🍦</span><span class="label">吃冰</span></button>
                </div>
            </div>

            <div class="category-card border-yellow-400 p-4 color-yellow">
                <h4 class="font-black text-lg mb-4 text-center">🌍 地點</h4>
                <div class="grid grid-cols-2 gap-2">
                    <button class="prompt-tag" onclick="addToPrompt('彩虹橋', 'on a rainbow bridge')"><span class="emoji">🌈</span><span class="label">彩虹</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('城堡', 'inside a magic castle')"><span class="emoji">🏰</span><span class="label">城堡</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('森林', 'in a deep green forest')"><span class="emoji">🌳</span><span class="label">森林</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('外太空', 'in the deep space')"><span class="emoji">🚀</span><span class="label">太空</span></button>
                </div>
            </div>

            <div class="category-card border-purple-400 p-4 color-purple">
                <h4 class="font-black text-lg mb-4 text-center">🖌️ 風格</h4>
                <div class="grid grid-cols-2 gap-2">
                    <button class="prompt-tag" onclick="addToPrompt('蠟筆', 'crayon drawing style, high quality')"><span class="emoji">🖍️</span><span class="label">蠟筆</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('樂高', 'made of Lego blocks')"><span class="emoji">🧱</span><span class="label">樂高</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('黏土', '3D clay animation style')"><span class="emoji">🧸</span><span class="label">黏土</span></button>
                    <button class="prompt-tag" onclick="addToPrompt('電影', 'cinematic lighting, 8k render')"><span class="emoji">🎬</span><span class="label">電影感</span></button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = ""; // 執行環境會自動提供
        const promptDisplay = document.getElementById('prompt-display');
        const counter = document.getElementById('counter');
        const resultContainer = document.getElementById('result-container');
        const loadingArea = document.getElementById('loading-area');
        const imageArea = document.getElementById('image-area');
        const outputImage = document.getElementById('output-image');
        const genBtn = document.getElementById('gen-btn');

        let selectedPrompts = [];

        function addToPrompt(zh, en) {
            if (selectedPrompts.some(item => item.en === en)) return;
            selectedPrompts.push({ zh, en });
            renderPrompts();
        }

        function renderPrompts() {
            if (selectedPrompts.length === 0) {
                promptDisplay.innerHTML = '<span class="text-orange-300 font-bold italic p-2">點選下方的圖卡來組合...</span>';
                counter.innerText = '0 個靈感';
                return;
            }
            counter.innerText = `${selectedPrompts.length} 個靈感`;
            promptDisplay.innerHTML = selectedPrompts.map((item, index) => `
                <div class="prompt-item">
                    <span>${item.zh}</span>
                    <button onclick="removeItem(${index})" class="ml-2 text-red-500"><i class="fas fa-times-circle"></i></button>
                </div>
            `).join('');
        }

        function removeItem(index) {
            selectedPrompts.splice(index, 1);
            renderPrompts();
        }

        function clearPrompt() {
            selectedPrompts = [];
            renderPrompts();
            resultContainer.style.display = 'none';
        }

        async function generateImage() {
            if (selectedPrompts.length === 0) {
                alert("籃子是空的喔！請先選幾個圖卡。");
                return;
            }

            // 顯示結果區與載入動畫
            resultContainer.style.display = 'block';
            loadingArea.classList.remove('hidden');
            imageArea.classList.add('hidden');
            genBtn.disabled = true;
            genBtn.classList.add('opacity-50');

            const basePrompt = selectedPrompts.map(item => item.en).join(', ');
            const finalPrompt = `A vivid, child-friendly illustration of ${basePrompt}. Bright colors, clear shapes, magical atmosphere, high resolution.`;

            try {
                const response = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                    {
                        method: 'POST',
                        body: JSON.stringify({
                            instances: { prompt: finalPrompt },
                            parameters: { sampleCount: 1 }
                        })
                    }
                );

                const data = await response.json();
                if (data.predictions && data.predictions[0].bytesBase64Encoded) {
                    const imageUrl = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    outputImage.src = imageUrl;
                    loadingArea.classList.add('hidden');
                    imageArea.classList.remove('hidden');
                } else {
                    throw new Error("生成失敗");
                }
            } catch (error) {
                console.error(error);
                alert("魔法電力不足，請再試一次！");
                resultContainer.style.display = 'none';
            } finally {
                genBtn.disabled = false;
                genBtn.classList.remove('opacity-50');
            }
        }

        async function fetchWithRetry(url, options, retries = 5) {
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return res;
                } catch (e) {}
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
            }
            throw new Error("Retry failed");
        }

        function downloadImg() {
            const link = document.createElement('a');
            link.href = outputImage.src;
            link.download = `my-magic-art-${Date.now()}.png`;
            link.click();
        }

        function copyFullPrompt() {
            if (selectedPrompts.length === 0) return;
            const text = selectedPrompts.map(item => item.en).join(', ');
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            alert("咒語已複製！");
        }
    </script>
</body>
</html>
